spring:
  config:
    import: optional:file:../.env[.properties]

  application:
    name: stock-ai-analyzer-backend

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:stockai}
    username: ${POSTGRES_USER:stockai_user}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

pgvector:
  host: ${POSTGRES_HOST:localhost}
  port: ${POSTGRES_PORT:5432}
  database: ${POSTGRES_DB:stockai}

python:
  script:
    path: ${PYTHON_SCRIPT_PATH:scripts/fetch_stock.py}
    fundamentals-path: ${PYTHON_FUNDAMENTALS_PATH:scripts/fetch_fundamentals.py}
    macro-path: ${PYTHON_MACRO_PATH:scripts/fetch_macro.py}
    historical-fundamentals-path: ${PYTHON_HISTORICAL_PATH:scripts/fetch_historical_fundamentals.py}
    sentiment-path: ${PYTHON_SENTIMENT_PATH:scripts/analyze_sentiment.py}
    technical-indicators-path: ${PYTHON_TECHNICAL_PATH:scripts/fetch_technical_indicators.py}

huggingface:
  token: ${HUGGINGFACE_TOKEN:}

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  timeout-minutes: 5
  embedding:
    model: nomic-embed-text
    dimension: 768
  chat:
    model: qwen2.5:7b

embedding:
  store:
    table: stock_embeddings
