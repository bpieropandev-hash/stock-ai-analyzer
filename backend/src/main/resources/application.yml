spring:
  application:
    name: stock-ai-analyzer-backend

  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:stockai}
    username: ${POSTGRES_USER:stockai_user}
    password: ${POSTGRES_PASSWORD:change_me}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:change_me}

python:
  script:
    path: ${PYTHON_SCRIPT_PATH:scripts/fetch_stock.py}
