spring:
  application:
    name: stock-ai-analyzer-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/stockai
    username: stockai_user
    password: change_me
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:change_me}

python:
  script:
    path: ${PYTHON_SCRIPT_PATH:scripts/fetch_stock.py}
    fundamentals-path: ${PYTHON_FUNDAMENTALS_PATH:scripts/fetch_fundamentals.py}
    macro-path: ${PYTHON_MACRO_PATH:scripts/fetch_macro.py}

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  embedding:
    model: nomic-embed-text
    dimension: 768
  chat:
    model: qwen2.5:7b

embedding:
  store:
    table: stock_embeddings
