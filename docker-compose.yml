services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: stock-ai-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stockai}
      POSTGRES_USER: ${POSTGRES_USER:-stockai_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stockai_user} -d ${POSTGRES_DB:-stockai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stock-ai-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_me}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change_me}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
